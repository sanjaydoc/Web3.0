name: Deploy dashboard to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

# Allow the workflow to publish to Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; don't cancel an in-progress deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install
      - name: Build dashboard
        run: pnpm --filter @web3/dashboard build
        env:
          # Baked into the static bundle: where the dashboard finds the live node.
          # Set this in Settings -> Secrets and variables -> Actions -> Variables.
          VITE_WEB3_URL: ${{ vars.WEB3_API_URL }}
      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true
      - name: Upload dist/ as the Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/dashboard/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
