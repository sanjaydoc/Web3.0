[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "web3-sdk"
version = "0.1.0"
description = "Python agent SDK for Web3.0 — build agents that register, talk, pay, and share data on the agentic internet."
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
authors = [{ name = "sanjaydoc" }]
dependencies = [
    "dilithium-py>=1.4.0",
    "kyber-py>=1.2.0",
    "websocket-client>=1.8.0",
]

[project.optional-dependencies]
dev = ["pytest>=7", "ruff>=0.1"]

[tool.setuptools.packages.find]
where = ["src"]

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "I", "W", "UP", "B"]

[tool.pytest.ini_options]
testpaths = ["tests"]
